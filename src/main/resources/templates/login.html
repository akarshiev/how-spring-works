<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Sign in</title>
    <style>
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #0a0a0a;
            border-radius: 24px;
            padding: 2rem;
            width: 360px;
            border: 1px solid #222;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            margin-top: 16px;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 24px;
            font-weight: 600;
            color: white;
        }

        a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Login to your account</h2>
    <form action="/api/auth/login" method="post">
        <div th:if="${param.error}" style="color: red;">
            <p th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">Xato xabari</p>
        </div>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign in →</button>
    </form>
    <p style="margin-top: 20px;"><a href="/register">Don't have an account? Register</a></p>
</div>
</body>
</html>
