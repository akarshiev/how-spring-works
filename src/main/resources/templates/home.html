<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Vercel Style Home</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #111111 100%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .buttons a {
            display: inline-block;
            margin: 1rem;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #ffffff;
            color: #000;
        }

        .btn-outline {
            border: 1px solid #fff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to Vercel-like Platform</h1>
    <p>Modern authentication with JWT + Spring Security</p>
    <div class="buttons">
        <a href="/login" class="btn-primary">Login</a>
        <a href="/register" class="btn-outline">Register</a>
        <a href="/user" class="btn-outline">Dashboard</a>
        <a href="/admin" class="btn-outline">Admin</a>
    </div>
</div>
</body>
</html>
