# ===== SERVER SOZLAMALARI =====
server.port=8080
spring.application.name=spring-boot-demo

# ===== CUSTOM SOZLAMALAR (AppProperties ga yuklanadi) =====
app.name=Spring Boot Demo
app.version=1.0.0
app.description=Bu loyiha Spring Boot auto-configuration qanday ishlashini korsatadi
app.features.greeting-enabled=true
app.features.details-enabled=false

# ===== ACTUATOR (auto-configuration larni korish) =====
# http://localhost:8080/actuator/conditions -> qaysi auto-configuration ishlagan/xato ketgan
management.endpoints.web.exposure.include=conditions,beans,info,env
management.info.env.enabled=true

# ===== INFO (actuator/info da korinadi) =====
info.app.name=${app.name}
info.app.version=${app.version}
