# Server sozlamalari
server.port=8080
spring.application.name=jwt-auth-demo

# H2 Database (RAM da ishlaydi)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA sozlamalari
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT sozlamalari
# Bu secret key - haqiqiy loyihada environment variable da saqlansin
# Uzunligi kamida 256 bit (32 belgi) bolishi kerak HS256 uchun
jwt.secret=aG93LXNwcmluZy13b3Jrcy1qd3QtYXV0aC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=
jwt.expiration=86400000
